body:
  text: 天台嗣祖沙門國清達珍輯形山淖禪師法嗣雪嶠信孫二人武林永慶遠峯青禪師上堂雪峯輥毬道吾舞笏弄巧成拙秘魔叉降魔劒自納敗闕玄沙虎子湖狗切忌道著道著即頭角生衢州祥符頓聞修禪師上堂當機覿面提覿面當機疾若不解轉身空費千鈞力小參故德有云薰風自南來殿角生微凉師曰祥符則不然朔風陣陣寒梅花樸鼻香若是守株待兔一定倚壁靠墻拈拄杖一齊約退敏修毅禪師法嗣四川羅漢幻白可禪師上堂十八十九口生肘後吉嘹舌頭一場漏逗山僧恁麼道大似十字街頭乞兒將一文錢買得箇油𩝐向珍御筵前點胸點肋曰這般滋味子能有幾人知有識者聞之豈但噴飯而已即今松直棘曲鵠白烏玄風鳴條雨破塊東掖山高琴溪水冷一一覿露常光不假修為造作有眼者見有耳者聞驀竪拄杖云住住說得道理好歸依佛法僧破山明禪師法嗣關中興善易庵印師禪師西蜀成都廖氏子佛誕上堂過去已過去未來渾莫算年年四月八人人慶佛誕當日獨稱尊而今殃害遍不墮雲門機瞻仰資無限大眾既同瞻仰還見釋迦老子麼竪拂子云不涉去來今毫端全體現四川百丈敏樹相禪師上堂識得一萬事畢趙州東壁挂葫蘆道吾舞笏無休歇諸仁者若無閑事在心頭便是人間好時節費隱容禪師法嗣三人杭州錢塘東明孤雲行鑑禪師嘉興宋氏子上堂十月廿五切忌莽鹵一句無私日輪當午直下翻身超佛越祖堪笑雪峯輥毬禾山打皷大丈夫作用超羣豈肯釘樁搖櫓解制小參春朝解制好行脚世出世間不可著活潑風流物外遊切莫無繩而自縛衲僧踐履不尋常佛祖從來難摸索脫體無依得自由大方獨步乾坤廓師於順治辛丑示寂塔建東明明州育王太白雪禪師解制上堂十五日已前開池不待月十五日已後池成月自來正當十五日竿木隨身逢場作戲處處綠楊堪繫馬家家有路透長安杭州東蓮古風然禪師嘉興許氏子上堂寒雲開曉嶂暖日照虗堂物物從茲始照然不覆藏靈芽抽夙種枯荄轉微黃上苑含香花未吐得沾淑氣競芬芳暴露泥牛翻身騰踏陳年骨董動地生光直得璞峯金嶺掀眉皷舞燈籠露柱俯首稱揚盡言門迎多吉慶無限風光各各喜逢佳節自然道泰時康雖然如是只者一般韶光媚景畢竟承誰恩力良久云元和力轉回天地散作林巒萬卉春上堂解語非干舌能言不是聲直教玄會得更不涉途程端的意甚分明以拄杖搖云無風荷葉動決定有魚行上堂大丈夫兒志莫灰切須猛力出頭來禪關今日重封鎻白汗從教下一回透徹根源諳落處一番心眼頓然開橫拈倒用隨施展剎海毫端萬象該無造作絕安排得意欣懷笑滿腮百日功成圓底事養成頭角待春雷師生於萬曆乙卯寂於康熈庚午八月二十八日塔建寺後凝雲峯下世壽七十六臘四十六有正續燈行世萬如微禪師法嗣南湖都門普濟介為舟禪師楚沔水趙姓上堂卓拄杖曰心不是佛智不是道拄杖子𨁝跳上三十三天觸著帝釋鼻孔打箇噴嚏落在諸人眉毛上廝結儘力抖擻不下直饒抖擻得下未免明眼人前三尺暗切須子細弘覺忞禪師法嗣二人本一薪傳瀾禪師婆子拋兒頌曰祇這孩兒也不消虎頭戴角出荒郊毒如蝎惡似鶚將軍誰數漢嫖姚鄂州向上釆商榮禪師中州海寧羅氏子上堂西風颯颯催寒樹黃葉飄飄滿地金已為止啼誰小哭分明狼藉祖師心急薦取莫因循忽然冬盡又逢春師於康熈丁未示寂偈云今年六十六事事皆具足翻身北斗藏山青與水綠塔於南溪之右牧雲門禪師法嗣桐城清泉十洲瀛禪師小參諸方打七慧山打三朝三暮四暮四朝三鉗錘雖然各別火色必定一般金剛圈栗棘蓬任你諸人吞跳主人公額頭上仔細參詳以拄杖畫一畫云透得者箇爐鞴過許你放參若透不過且聽山僧一指南喝一喝解制春山覆雪春艸萌芽春日和融春風襲襲衲僧艸鞋癢癢只欲涉水登山長老拄杖搖搖直得拋磚引玉去年結也是隨方應時節今年解終始何妨早數天佛法猶如水中月長長短短皆光圓有佛處不得住百艸頭上祖師意無佛處急走過家家門首長安路三千里外不得錯舉墻有風壁有耳恁麼則不去也無端又打之乎者摘楊花摘楊花思量擬議隔千差正恁麼時且道天台鴈宕可遊不可遊投子浮山可到不可到良久云莫將閒學解埋沒祖師心石奇雲禪師法嗣蕭山湘湖冷堂林禪師華亭沈氏子投華山一雨法師披剃遍參諸方次參雪竇受囑上堂昨夜西風拂石龍今朝覿面又相逢箇中消息元無異想像毗盧老主翁康熈戊申師示寂留偈曰來無一絲去無一線七十二年虗空閃電撒手浩歌歸去來臨行拋出吹毛劒喝一喝奄然而逝金華智巖萬因聖侍者忞國師屢勸出世師不肯嘗垂五問其一曰一乎便應底人因甚喚不回頭二從來無背面人人有箇鼻孔因甚摸不著三只為太近機如掣電底人因甚降龍塔不肯點頭四竿木隨身逢場作戲因甚又道拄杖子不在手裏五二水合流因甚到千丈岩前便七花八裂浮石賢禪師法嗣二人蘇州楓江法華彌壑澧禪師上堂法身無相櫻桃果熟春枝上法眼無瑕漁父時歌江上槎無事倚笻閒眺望河山萬里好生涯上堂祖師意如來禪猿啼巴峽水闊湘潭諸人不會圅關月落聽雞度若也瞥地華岳雲開立馬看金陵保寧嵋樵禪師上堂乃竪拂云迷時祇迷者箇手執夜明符幾箇知天曉擊拂云悟明祇悟者者箇椎碎蟠桃核還見舊時仁放下拂云縱饒迷悟心盡灸瘡瘢上更著艾爝莫有獨超格則道得一句者麼擿拂云惜取眉毛林野奇禪師法嗣二人汝州風穴雲峩喜禪師蜀之紫陽陳氏子徧參諸方晚入天童參林野奇和尚一日侍奇山行胸中廓然冰釋即呈偈曰罷罷罷休休休橫眠倒臥在山丘翻身拶碎虗空骨萬象森羅笑點頭奇即頷之後開法普濟次遷龍池風穴小參將心作佛剜肉補瘡了妄歸真潑油救火機前負荷平地千差直下承當白雲萬里總不恁麼入無間獄行但行坐但坐饑來喫飯困來打眠也只嬴得一味平常猶未是衲僧向上事何也三面狸奴脚踏月兩頭白牯手擎烟京都淨壽道安靜禪師山陰鄭氏子示眾瞬目揚眉早已錯過拈椎竪拂落二落三到者裏全身放下直下知歸略較些子若也卜度沉吟正是迥風鈍鴿只合籬下覊棲安可翱翔雲外小參識得一萬事畢佛法僧三寶拈過一邊戒定慧等學置而勿論馬師三甕醬投子一瓶油滋味頻添在口頭石菴琈禪師法嗣嘉興普明浪山嶼禪師上堂薰風涼夏日長白雲澹澹流水蒼蒼黃鶯啼綠樹旭日照虗堂末後句絕囊藏人在藕花香世界風流廓徹體全彰小參雲騰致雨露結為霜分明歷歷徧界不藏揮拂子曰玄沙原是謝三郎無礙徹禪師法嗣吉州耽源鍵畿銓禪師上堂覿面明明人不識一顆圓明色非色名不得狀不得兩道眉毛葢却鼻知不得解不得臨濟廝兒白拈賊不是心不是佛門前一池水照徹虗空骨山曉晳禪師法嗣南嶽大善天培鑑禪師示眾大善今日初結制普請兄弟各仔細二六時中總莫分單單觀著自家鼻不惟昏散盡掃除從前悟得俱要棄不勞更問祖師禪不勞再問第一義釋迦老子不唧𠺕達磨祖師成特地三千七百雖超奇山僧來總不是既超奇為何不是良久噓一噓曰參節巖琇禪師法嗣常州江陰大悲曇照明禪師小參有一句子等閒不輕示騎牛上崑崙踏出虗空髓蟭螟急得雙眼紅毗盧界內煙塵起堂前露柱久懷胎生下孩兒多意氣良久云是何言歟小參徧呈貪眠曼殊失曉目連打失眼睛笑殺子丑寅卯多少孟八郎渾身入荒艸山色溪聲著眼看珊瑚枝上日杲杲小參德山老子拈一條棒佛來也打魔來也打眼空四海背負須彌與奪自在殺活現前若到衲僧門下掃地挑屎未有分在汝等黃瓜茄子何曾識得好惡具德禮禪師法嗣廬山萬杉剖玉璞禪師古蓼朱氏子幼依廬州伏虎寺祝髮出謁瑞光徹圓具看竹篦子話後扣三峯有年乃於棒下透徹臨濟宗旨繼見靈隱禮機契命充第二座出住京口焦山次興萬杉上堂橫按拄杖曰靈山話月以訛傳訛曹溪指月將錯就錯天下老和尚貴買硃砂隨邪逐惡新海門一擊敲落天下黯黑要使先聖後賢逈出明白窠臼其或未然撥轉雲頭另與諸人相見去也遂擲拄杖下座僧問如何是佛師曰孟八郎漢僧禮拜師曰將勤補拙浪山嶼禪師法嗣嘉興普明字𠁼圓禪師上堂僧問如何是過去心師云趙州衫子重七觔進云如何是未來心師云牛上騎牛笑殺人進云如何是未來心師云無勞日下挂紅燈進云三心中那一心成佛師云蒼天中更添冤苦乃云目前無法意在目前饑來喫飯困即打眠拍禪床云三口渡邊魚跳網崑崙騎象鷺鷥牽誕日小參圓上座憶得出母胎時有則公案未曾舉著今日不免快便難逢舉似諸兄良久云黃河三千年一度清普明退院上堂道人住處原無定向動若行雲止猶谷神雲從龍風從虎隨處作主遇緣即宗有時孤峯頂上潛名隱迹有時十字街頭較是論非賓則始終賓主則始終主脫體無依隨處自在汝等還知山僧樂處麼拽杖便出述先預禪師法嗣維揚淨慧在明德禪師小參惺惺的不在明白裏瞌睡漢豈處昏沉中離此二途且向何處安身立命若說睡惺不二依舊無本可據諸兄弟還會麼深林黃鳥尋朋切綠水浮鷗傍母眠解制小參把住要津不通凡聖放開一線任爾縱橫諸兄還是把住好放行好梅馨透骨何人薦又逐春風向藕塘骨巖峯禪師法嗣湖州報恩梓昌英禪師小參非心非佛圓相著點即心即佛黃葉止啼楊岐驢子湖狗四料三玄驢脚佛手者一隊漢若到報恩門下掃地挑屎總用不著顧眾云還有祖師麼十洲瀛禪師法嗣桐城谷林大宜禪師小參春風和暖日長夜短青山依舊青乾坤依舊轉山僧拄杖頭今古何嘗免謹白參玄人道不遠人人自遠雲峯授禪師法嗣揚州西方南源信禪師聖節上堂四民安其業百官盡其分相共擊壤以頌太平皷腹以歌王化厥修盛世無過此時吾沙門釋子律心有慧治身有戒入保社萍蹤湖海趨雲水寄迹煙霞同一師法同一受用只如王恩佛恩如何報答舉如意云若向途中覓猶爭半月程小參上前不足退後猶寬只知鹽味那知醋酸夜深燭隱無餘事又把閑書月下看示眾舉磬山修祖云諸方善知識道眼高福德大叢林整齊飲食清潔可謂難見而易親也老僧者裏世緣淺薄闢艸開荒茶飯麤糲可謂易見而難親也師云昔日磬山今朝奉聖同坑無異土且於不難不易一句又作麼生彈指頓超千聖外揚眉不是目前機
